name: Test Bootstrap

on:
  workflow_dispatch:
  push:
    paths:
      - 'manifests/**'
      - '.github/workflows/test-bootstrap.yml'
      - 'scripts/ci/**'
      - 'tools/bench/**'
      - 'docs/performance/**'
      - 'pkg/network/nat/**'
      - 'pkg/security/dpi/**'
      - 'pkg/security/policy/**'
      - 'pkg/security/threatintel/**'

jobs:
  perf-baseline:
    # Sprint 30 / Ticket 43 and Sprint 31 / Ticket 54. Non-blocking
    # performance baseline covering four hot paths: NAT apply, DPI
    # event → Cilium policy, FilterPolicy translate, and threat-intel
    # translate. The benchmark wrapper runs `go test -bench=.
    # ./tools/bench/...`, which picks up every *_bench_test.go file in
    # the package, so new benchmarks land here automatically without a
    # workflow edit. It uploads the raw output and the summary as
    # artifacts, and prints a warning (not a failure) on >20% median
    # ns/op regression vs the active baseline file in
    # docs/performance/. The job is configured with continue-on-error
    # so a noisy runner never blocks merges; the script exit code
    # tracks real `go test` failures, not regressions.
    name: Performance baseline (four hot paths)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Run hot-path benches
        run: scripts/ci/run-bench.sh
        env:
          BENCH_COUNT: '10'
          BENCH_OUT: bench-output.txt
          BENCH_SUMMARY: bench-summary.md

      - name: Upload bench artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hot-path-bench
          path: |
            bench-output.txt
            bench-summary.md
          if-no-files-found: warn

  bootstrap-test:
    name: Bootstrap Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      KIND_VERSION: v0.17.0
      WORKLOAD_TIMEOUT: 240s
      DPI_MANAGER_IMAGE: fos1-local/dpi-manager:ci
      NTP_CONTROLLER_IMAGE: fos1-local/ntp-controller:ci
      EVENT_CORRELATOR_IMAGE: fos1-local/event-correlator:ci
      IDS_CONTROLLER_IMAGE: fos1-local/ids-controller:ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Kubernetes
        run: |
          set -euo pipefail

          curl -fsSLo kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

          cat > kind-config.yaml <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
          networking:
            podSubnet: "10.244.0.0/16"
            serviceSubnet: "10.96.0.0/12"
          EOF

          kind create cluster --config kind-config.yaml --wait 2m
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Install Kustomize
        run: |
          set -euo pipefail

          curl -fsSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Build local proof images
        run: |
          set -euo pipefail

          docker build -t "${DPI_MANAGER_IMAGE}" -f Dockerfile .
          docker build -t "${NTP_CONTROLLER_IMAGE}" -f pkg/ntp/Dockerfile .
          docker build -t "${EVENT_CORRELATOR_IMAGE}" -f build/event-correlator/Dockerfile .
          docker build -t "${IDS_CONTROLLER_IMAGE}" -f build/ids-controller/Dockerfile .

      - name: Load local proof images into Kind
        run: |
          set -euo pipefail

          kind load docker-image "${DPI_MANAGER_IMAGE}" --name fos1-local-proof
          kind load docker-image "${NTP_CONTROLLER_IMAGE}" --name fos1-local-proof
          kind load docker-image "${EVENT_CORRELATOR_IMAGE}" --name fos1-local-proof
          kind load docker-image "${IDS_CONTROLLER_IMAGE}" --name fos1-local-proof

      - name: Create namespaces
        run: |
          set -euo pipefail

          for namespace in network security monitoring; do
            kubectl create namespace "${namespace}" --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Pre-process manifests for Kind
        run: |
          set -euo pipefail

          mkdir -p test-manifests/base
          cp -r manifests/base/. test-manifests/base/

          find test-manifests -type f -name "*.yaml" -exec sed -i 's/hostNetwork: true/hostNetwork: false/g' {} \;
          find test-manifests -type f -name "*.yaml" -exec sed -i '/capabilities:/,/add:/s/NET_ADMIN//' {} \;
          find test-manifests -type f -name "*.yaml" -exec sed -i '/capabilities:/,/add:/s/NET_RAW//' {} \;
          find test-manifests -type f -name "*.yaml" -exec sed -i '/capabilities:/,/add:/s/SYS_TIME//' {} \;

          # Keep the Kind harness focused on the repository-owned NTP controller
          # scrape path. Optional operator add-ons and the chrony daemonset are
          # intentionally excluded from this proof slice.
          cat > test-manifests/base/dns/kustomization.yaml <<'EOF'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization

          resources:
            - crds/dnszone.yaml
            - crds/mdnsreflection.yaml
            - crds/dnsclient.yaml
            - crds/dnsfilterlist.yaml
            - crds/ptrzone.yaml
          EOF

          cat > test-manifests/base/dhcp/kustomization.yaml <<'EOF'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization

          resources:
            - crds/dhcpv4service.yaml
            - crds/dhcpv6service.yaml
          EOF

          cat > test-manifests/base/ntp/kustomization.yaml <<'EOF'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization

          namespace: network

          resources:
            - ntp-crd.yaml
            - ntp-controller.yaml
            - service.yaml

          commonLabels:
            app.kubernetes.io/part-of: fos1
            app.kubernetes.io/component: ntp
            app.kubernetes.io/managed-by: kustomize
          EOF

          sed -i 's/--integration=true/--integration=false/' test-manifests/base/ntp/ntp-controller.yaml
          sed -i "s|image: custom/ntp-controller:latest|image: ${NTP_CONTROLLER_IMAGE}|" test-manifests/base/ntp/ntp-controller.yaml
          sed -i "s|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|" test-manifests/base/ntp/ntp-controller.yaml
          perl -0pi -e 's/zeek:\n(\s+)enabled: true/zeek:\n${1}enabled: false/' test-manifests/base/security/dpi-manager.yaml
          sed -i "s|image: your-org/fos1-dpi-manager:latest|image: ${DPI_MANAGER_IMAGE}|" test-manifests/base/security/dpi-manager.yaml
          sed -i "s|imagePullPolicy: Always|imagePullPolicy: Never|" test-manifests/base/security/dpi-manager.yaml

          # Rewire the IDS controller manifest so it consumes the locally
          # loaded image. The correlator runtime Deployment the
          # controller synthesises still hard-codes the public image
          # name; the E2E proof script patches that Deployment in-place
          # after reconciliation.
          sed -i "s|image: fos1/ids-controller:latest|image: ${IDS_CONTROLLER_IMAGE}|" test-manifests/base/security/ids/ids-controller.yaml
          sed -i "0,/imagePullPolicy: IfNotPresent/s|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|" test-manifests/base/security/ids/ids-controller.yaml

          date -u +"%Y-%m-%dT%H:%M:%SZ" > deploy-start.txt

      - name: Render manifests
        run: |
          set -euo pipefail

          for component in core network dns dhcp ntp security monitoring; do
            output_file="$(mktemp)"
            kustomize build "test-manifests/base/${component}" > "${output_file}"
            object_count="$(awk '/^kind:/ { count++ } END { print count + 0 }' "${output_file}")"
            echo "Rendered ${component}: ${object_count} objects"
            rm -f "${output_file}"
          done

      - name: Deploy core components
        run: |
          set -euo pipefail

          kubectl apply -k test-manifests/base/core
          bash scripts/ci/k8s-wait-for-readiness.sh network "${WORKLOAD_TIMEOUT}" true

      - name: Deploy network components
        run: |
          set -euo pipefail

          rendered="$(mktemp)"
          kustomize build test-manifests/base/network > "${rendered}"
          if grep -q '[^[:space:]]' "${rendered}"; then
            kubectl apply -f "${rendered}"
          else
            echo "No network resources rendered; skipping apply."
          fi
          rm -f "${rendered}"

      - name: Deploy DNS services
        run: |
          set -euo pipefail

          kubectl apply -k test-manifests/base/dns
          bash scripts/ci/k8s-wait-for-readiness.sh network "${WORKLOAD_TIMEOUT}" true

      - name: Deploy DHCP services
        run: |
          set -euo pipefail

          kubectl apply -k test-manifests/base/dhcp
          bash scripts/ci/k8s-wait-for-readiness.sh network "${WORKLOAD_TIMEOUT}" true

      - name: Deploy NTP controller proof slice
        run: |
          set -euo pipefail

          kubectl apply -k test-manifests/base/ntp
          bash scripts/ci/k8s-wait-for-readiness.sh network "${WORKLOAD_TIMEOUT}" true

      - name: Deploy security services
        run: |
          set -euo pipefail

          kubectl apply -k test-manifests/base/security
          bash scripts/ci/k8s-wait-for-readiness.sh security "${WORKLOAD_TIMEOUT}" true

      - name: Deploy monitoring services
        run: |
          set -euo pipefail

          kubectl apply -k test-manifests/base/monitoring
          for workload in deployment/prometheus daemonset/fluentd statefulset/elasticsearch; do
            kubectl rollout status "${workload}" -n monitoring --timeout="${WORKLOAD_TIMEOUT}"
          done

      - name: Runtime proof checks
        run: |
          set -euo pipefail

          for service in prometheus elasticsearch; do
            endpoints="$(kubectl get endpoints "${service}" -n monitoring -o jsonpath='{.subsets[*].addresses[*].ip}')"
            if [[ -z "${endpoints}" ]]; then
              echo "Service ${service} in monitoring has no ready endpoints." >&2
              exit 1
            fi
            echo "Service ${service} endpoints: ${endpoints}"
          done

          dpi_endpoints="$(kubectl get endpoints dpi-manager -n security -o jsonpath='{.subsets[*].addresses[*].ip}')"
          if [[ -z "${dpi_endpoints}" ]]; then
            echo "Service dpi-manager in security has no ready endpoints." >&2
            exit 1
          fi
          echo "Service dpi-manager endpoints: ${dpi_endpoints}"

          bash scripts/ci/prove-security-log-pipeline.sh
          bash scripts/ci/prove-prometheus-scrapes.sh
          bash scripts/ci/prove-dpi-natural-traffic.sh

      - name: Prove ES rollover and deletion
        run: |
          set -euo pipefail

          # The base monitoring kustomization intentionally does NOT include
          # elasticsearch-ci-accelerated-ilm.yaml, so apply it explicitly
          # before the retention proof. The script itself is also tolerant
          # if the ConfigMap is already present.
          kubectl apply -f manifests/base/monitoring/elasticsearch-ci-accelerated-ilm.yaml

          bash scripts/ci/prove-es-retention-rollover.sh

      - name: Deploy IDS controller for event correlation proof
        run: |
          set -euo pipefail

          # The base security kustomization intentionally excludes the
          # IDS controller subtree. Apply just the pieces the correlator
          # E2E proof needs: the EventCorrelation CRD and the controller
          # Deployment/RBAC that reconciles EventCorrelation instances
          # into Deployments.
          kubectl apply -f test-manifests/base/security/ids/crds/eventcorrelation.yaml
          kubectl apply -f test-manifests/base/security/ids/ids-controller.yaml

          kubectl rollout status deployment/ids-controller -n security \
            --timeout="${WORKLOAD_TIMEOUT}"

      - name: Prove event correlation end-to-end
        env:
          E2E_CORRELATOR_IMAGE_OVERRIDE: ${{ env.EVENT_CORRELATOR_IMAGE }}
        run: |
          set -euo pipefail

          # The EventCorrelation controller hard-codes
          # "fos1/event-correlator:latest" on the generated Deployment.
          # The proof script detects E2E_CORRELATOR_IMAGE_OVERRIDE and
          # patches the Deployment to use the locally loaded image with
          # imagePullPolicy=Never before asserting readiness.
          bash scripts/ci/prove-event-correlation-e2e.sh

      - name: Prove controller leader-election failover
        run: |
          set -euo pipefail

          # Sprint 31 / Ticket 47: kill the active leader pod of a target
          # controller (default ids-controller) and assert the standby
          # acquires the Lease within RTO ≤ 30s. ids-controller is the
          # target because it's a Deployment with replicas=2 already
          # rolled out by the previous step in this workflow.
          bash scripts/ci/prove-leader-failover.sh

      - name: Prove cert-manager rotation is hot-reloaded
        run: |
          set -euo pipefail

          # Sprint 31 / Ticket 49: force a Certificate renewal via cmctl
          # and assert the controller's /healthz stays 200 throughout
          # while the served leaf cert's NotBefore advances. Targets
          # the api-server by default (already deployed for the
          # readiness checks above). The script tolerates absence of
          # cmctl by falling back to a Secret-delete trigger.
          if ! command -v cmctl >/dev/null 2>&1; then
            curl -fsSL -o /tmp/cmctl.tar.gz \
              https://github.com/cert-manager/cmctl/releases/latest/download/cmctl_linux_amd64.tar.gz \
              || true
            if [ -s /tmp/cmctl.tar.gz ]; then
              tar -xzf /tmp/cmctl.tar.gz -C /tmp || true
              if [ -x /tmp/cmctl ]; then
                sudo install -m 0755 /tmp/cmctl /usr/local/bin/cmctl || true
              fi
            fi
          fi

          bash scripts/ci/prove-cert-rotation.sh

      - name: Validate dashboard + alert-rule PromQL against live series
        run: |
          set -euo pipefail

          # Port-forward Prometheus to the same local port the scrape-proof
          # script uses so the validator queries the live Kind Prometheus
          # recording series from the owned exporters.
          kubectl port-forward -n monitoring service/prometheus 19090:9090 \
            >/tmp/fos1-prometheus-validator-port-forward.log 2>&1 &
          port_forward_pid=$!
          trap 'kill "${port_forward_pid}" >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:19090/-/ready" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          go build -o /tmp/prometheus-query-validator ./tools/prometheus-query-validator
          /tmp/prometheus-query-validator \
            -prometheus-url "http://127.0.0.1:19090" \
            -allowlist "manifests/dashboards/.queries-target-architecture.txt" \
            -dashboards "manifests/dashboards" \
            -alert-rules "manifests/base/monitoring/alert-rules.yaml"

      - name: Failure diagnostics
        if: failure()
        run: |
          set -euo pipefail

          echo "=== FAILED WORKLOAD SNAPSHOT ==="
          kubectl get pods -A -o wide
          echo

          echo "=== RECENT EVENTS ==="
          kubectl get events -A --sort-by='.metadata.creationTimestamp' | tail -n 200
          echo

          echo "=== NON-READY POD DETAILS ==="
          mapfile -t pods < <(kubectl get pods -A --no-headers | awk '$4 != "Running" && $4 != "Completed" {print $1 " " $2}')
          if ((${#pods[@]} == 0)); then
            echo "All pods are Running or Completed."
            exit 0
          fi

          for pod in "${pods[@]}"; do
            namespace="${pod%% *}"
            name="${pod##* }"
            echo "--- describe pod/${name} -n ${namespace} ---"
            kubectl describe pod "${name}" -n "${namespace}"
            echo "--- logs pod/${name} -n ${namespace} --all-containers --tail=100 ---"
            if ! kubectl logs "${name}" -n "${namespace}" --all-containers --tail=100; then
              echo "Unable to fetch logs for pod/${name} in namespace ${namespace}."
            fi
            echo
          done

      - name: Summary report
        if: always()
        run: |
          set -euo pipefail

          echo "=== DEPLOYMENT SUMMARY ==="
          echo "Deployment started at: $(cat deploy-start.txt)"
          echo "Deployment completed at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo

          echo "=== NAMESPACES ==="
          kubectl get namespaces
          echo

          echo "=== WORKLOAD STATUS ==="
          kubectl get deployments,daemonsets,statefulsets -A
          echo

          echo "=== POD STATUS ==="
          kubectl get pods -A
          echo

          echo "=== SERVICES ==="
          kubectl get services -A
