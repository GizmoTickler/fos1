name: CI

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'manifests/**'
      - 'scripts/ci/**'
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'cmd/**/Dockerfile'
      - 'Makefile'
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'manifests/**'
      - 'scripts/ci/**'
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'cmd/**/Dockerfile'
      - 'Makefile'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1
          args: ./...

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: manifests/
          config_file: .yamllint.yml

  verify-mainline:
    name: Verify Mainline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run canonical Go verification
        run: make verify-mainline

      - name: Prove FRR vtysh mTLS sidecar
        run: scripts/ci/prove-frr-vtysh-tls.sh
