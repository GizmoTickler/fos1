apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
    component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        component: dashboard
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:9.4.7
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"  # Would use a secret in production
        - name: GF_SECURITY_ADMIN_USER
          value: "admin"
        - name: GF_SERVER_ROOT_URL
          value: "http://localhost:3000/"
        volumeMounts:
        - name: data-volume
          mountPath: /var/lib/grafana
        - name: datasource-volume
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboard-provider-volume
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboard-volume
          mountPath: /var/lib/grafana/dashboards/fos1
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: grafana-data
      - name: datasource-volume
        configMap:
          name: grafana-config
          items:
          - key: datasource.yaml
            path: datasource.yaml
      - name: dashboard-provider-volume
        configMap:
          name: grafana-config
          items:
          - key: dashboards.yaml
            path: dashboards.yaml
      - name: dashboard-volume
        configMap:
          name: grafana-dashboards
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: fos1
        orgId: 1
        folder: FOS1
        folderUid: fos1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards/fos1
