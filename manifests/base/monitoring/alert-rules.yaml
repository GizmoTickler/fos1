apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: monitoring
data:
  dpi-alerts.yml: |
    groups:
    - name: dpi.rules
      rules:
      - alert: DPIEventBurst
        expr: sum(increase(dpi_events_total[5m])) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DPI event burst detected"
          description: "The owned DPI pipeline recorded more than 50 events in the last 5 minutes."

      - alert: ZeekReportedStopped
        expr: max(dpi_zeek_status{status="stopped"}) == 1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Zeek reported as stopped"
          description: "The exported Zeek status has remained stopped for more than 10 minutes."

      - alert: ZeekLogsNotAdvancing
        expr: max(dpi_zeek_status{status="running"}) == 1 and increase(dpi_zeek_logs_processed[15m]) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Zeek log processing stalled"
          description: "Zeek is marked running but no additional logs were processed over the last 15 minutes."

      - alert: DPIProtocolConnectionSurge
        expr: max(dpi_protocol_connections) > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High protocol connection count"
          description: "A DPI protocol bucket exceeded 1000 tracked connections for more than 10 minutes."

  ntp-alerts.yml: |
    groups:
    - name: ntp.rules
      rules:
      - alert: NTPSyncLostBaseline
        expr: ntp_sync == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NTP synchronization lost"
          description: "The owned NTP exporter has reported an unsynchronized state for more than 5 minutes."

      - alert: NTPHighOffsetBaseline
        expr: abs(ntp_offset_milliseconds) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "NTP offset too high"
          description: "Clock offset has stayed above 100ms for more than 10 minutes."

      - alert: NTPHighJitterBaseline
        expr: ntp_jitter_milliseconds > 50
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "NTP jitter too high"
          description: "Clock jitter has stayed above 50ms for more than 15 minutes."
