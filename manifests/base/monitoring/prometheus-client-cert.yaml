---
# Sprint 32 / Ticket 57 — client identity Prometheus presents when scraping
# owned mTLS metrics endpoints.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-client-tls
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: fos1
    app.kubernetes.io/component: tls-client
spec:
  secretName: prometheus-client-tls
  duration: 2160h    # 90d
  renewBefore: 360h  # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  commonName: prometheus
  usages:
    - client auth
    - digital signature
    - key encipherment
  issuerRef:
    name: fos1-internal-ca
    kind: ClusterIssuer
    group: cert-manager.io
