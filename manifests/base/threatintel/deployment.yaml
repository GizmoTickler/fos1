apiVersion: apps/v1
kind: Deployment
metadata:
  name: threatintel-controller
  namespace: security
  labels:
    app: threatintel-controller
    component: security
spec:
  # Sprint 31 / Ticket 47: HA active/standby with leader election.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: threatintel-controller
  template:
    metadata:
      labels:
        app: threatintel-controller
        component: security
    spec:
      serviceAccountName: threatintel-controller
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: threatintel-controller
      containers:
        - name: controller
          image: ghcr.io/varuntirumala1/fos1-threatintel-controller:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--tick-interval=30s"
            - "--http-timeout=30s"
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f threatintel-controller >/dev/null"]
            initialDelaySeconds: 10
            periodSeconds: 30
          # Sprint 31 / Ticket 49: cert-manager-rotated material is
          # mounted for future TLS adoption (read-only debug endpoints,
          # Prometheus metrics). The reconcile loop itself does not yet
          # serve HTTP.
          volumeMounts:
            - name: tls
              mountPath: /var/run/secrets/fos1.io/tls
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: threatintel-controller-tls
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: threatintel-controller
  namespace: security
  labels:
    app: threatintel-controller
spec:
  selector:
    app: threatintel-controller
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
