apiVersion: v1
kind: ServiceAccount
metadata:
  name: threatintel-controller
  namespace: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: threatintel-controller
rules:
  - apiGroups: ["security.fos1.io"]
    resources: ["threatfeeds"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["security.fos1.io"]
    resources: ["threatfeeds/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies", "ciliumclusterwidenetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Sprint 31 Ticket 53: MISP feeds reference API-key Secrets via
  # spec.authSecretRef. Read-only access is required to load the `apiKey`
  # data key before each fetcher build.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: threatintel-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: threatintel-controller
subjects:
  - kind: ServiceAccount
    name: threatintel-controller
    namespace: security
