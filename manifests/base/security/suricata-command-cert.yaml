apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: suricata-command-tls
  namespace: security
spec:
  secretName: suricata-command-tls
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  commonName: suricata-command
  dnsNames:
    - suricata-command
    - suricata-command.security
    - suricata-command.security.svc
    - suricata-command.security.svc.cluster.local
  usages:
    - server auth
    - client auth
    - digital signature
    - key encipherment
  issuerRef:
    name: fos1-internal-ca
    kind: ClusterIssuer
    group: cert-manager.io
