apiVersion: apps/v1
kind: Deployment
metadata:
  name: ids-controller
  namespace: security
  labels:
    app: ids-controller
    component: security
spec:
  # Sprint 31 / Ticket 47: HA active/standby with leader election. The
  # ids-controller is the target of the leader-failover CI proof
  # (scripts/ci/prove-leader-failover.sh) — it's a Deployment (not a
  # DaemonSet) and the Kind harness already deploys it.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: ids-controller
  template:
    metadata:
      labels:
        app: ids-controller
        component: security
    spec:
      serviceAccountName: ids-controller
      affinity:
        podAntiAffinity:
          # Single-node Kind requires `preferred` so both replicas can
          # co-schedule. Multi-node clusters get the spread for free.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: ids-controller
      containers:
      - name: controller
        image: fos1/ids-controller:latest
        imagePullPolicy: IfNotPresent
        args:
        - "--v=2"
        env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        ports:
        - name: metrics
          containerPort: 8080
        # Sprint 31 / Ticket 49: cert-manager-rotated material is
        # mounted for future TLS adoption on the controller-runtime
        # manager's metrics + probe listener. The current ids-controller
        # binary does not yet wire this directory into a TLS listener;
        # once it does, the probes flip to scheme: HTTPS in the same
        # commit. Mounting now avoids a manifest churn at that point.
        volumeMounts:
        - name: tls
          mountPath: /var/run/secrets/fos1.io/tls
          readOnly: true
      volumes:
      - name: tls
        secret:
          secretName: ids-controller-tls
          # optional=true prevents pod startup failure if the
          # Certificate has not yet reconciled — kubelet picks up the
          # new mount without a restart once it does.
          optional: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ids-controller
  namespace: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ids-controller
rules:
- apiGroups: ["security.fos1.io"]
  resources: ["suricatainstances", "zeekinstances", "eventcorrelations"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["security.fos1.io"]
  resources: ["suricatainstances/status", "zeekinstances/status", "eventcorrelations/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: [""]
  resources: ["configmaps", "services", "pods", "events"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ids-controller
subjects:
- kind: ServiceAccount
  name: ids-controller
  namespace: security
roleRef:
  kind: ClusterRole
  name: ids-controller
  apiGroup: rbac.authorization.k8s.io
---
# Sprint 31 / Ticket 47: namespace-scoped lease verbs for leader election.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ids-controller-leaderelection
  namespace: security
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ids-controller-leaderelection
  namespace: security
subjects:
- kind: ServiceAccount
  name: ids-controller
  namespace: security
roleRef:
  kind: Role
  name: ids-controller-leaderelection
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: ids-controller
  namespace: security
  labels:
    app: ids-controller
    component: security
spec:
  selector:
    app: ids-controller
  ports:
  - name: metrics
    port: 8080
    targetPort: metrics
  type: ClusterIP
