---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fos1-api-server
  namespace: security
---
# The REST API surface (Sprint 30 Ticket 41 + Sprint 31 Ticket 48) is scoped
# to the FilterPolicy resource family. The ClusterRole grants only the verbs
# the server actually issues — Ticket 41 shipped read (get/list/watch) and
# Ticket 48 added the write verbs (create/update/patch/delete). Adding
# further verbs or resources requires a follow-up ticket with RBAC review.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fos1-api-server
rules:
  - apiGroups:
      - security.fos1.io
    resources:
      - filterpolicies
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fos1-api-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fos1-api-server
subjects:
  - kind: ServiceAccount
    name: fos1-api-server
    namespace: security
---
# Sprint 31 / Ticket 47: namespace-scoped Role granting the lease verbs the
# controller-runtime manager needs for leader election. The Lease object
# lives in this controller's namespace (security); a Role + RoleBinding is
# enough — no ClusterRole / ClusterRoleBinding required.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fos1-api-server-leaderelection
  namespace: security
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fos1-api-server-leaderelection
  namespace: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fos1-api-server-leaderelection
subjects:
  - kind: ServiceAccount
    name: fos1-api-server
    namespace: security
---
# Default (empty) allowlist ConfigMap. Operators override this with their
# own list of authorized client-cert Subject CNs, one per line. Lines
# starting with '#' are ignored.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fos1-api-server-allowlist
  namespace: security
data:
  allowlist: |
    # Add one client-cert Subject CN per line. The v1 write-path API denies
    # every request from a subject not listed here with HTTP 403.
