---
# Sprint 31 / Ticket 49 migration: the per-environment Issuer was
# replaced by the cluster-wide fos1-internal-ca ClusterIssuer defined
# at manifests/base/certificates/cluster-issuer-internal.yaml. The
# Secret name is preserved (fos1-api-server-tls) so the existing
# Deployment volume mount keeps working without churn.
#
# Overlays that need a different trust anchor (e.g. an external CA)
# can replace this Certificate by patching the issuerRef field.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: fos1-api-server-tls
  namespace: security
  labels:
    app.kubernetes.io/part-of: fos1
    app.kubernetes.io/component: tls-server
spec:
  secretName: fos1-api-server-tls
  duration: 2160h   # 90d
  renewBefore: 360h # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  commonName: fos1-api-server
  dnsNames:
    - fos1-api-server
    - fos1-api-server.security
    - fos1-api-server.security.svc
    - fos1-api-server.security.svc.cluster.local
  issuerRef:
    name: fos1-internal-ca
    kind: ClusterIssuer
    group: cert-manager.io
  usages:
    - server auth
    - digital signature
    - key encipherment
