apiVersion: apps/v1
kind: Deployment
metadata:
  name: fos1-api-server
  namespace: security
  labels:
    app: fos1-api-server
    component: api
spec:
  # Sprint 31 / Ticket 47: HA active/standby. Two replicas with
  # leader-election; standby's controller-runtime manager blocks at
  # mgr.Start until it acquires the Lease (RTO ≤ 30s).
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxUnavailable: 1 lets a rolling restart cycle one pod at a
      # time so leadership has somewhere to fail over to.
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: fos1-api-server
  template:
    metadata:
      labels:
        app: fos1-api-server
        component: api
    spec:
      serviceAccountName: fos1-api-server
      affinity:
        podAntiAffinity:
          # `preferred` keeps the two replicas on different nodes when the
          # cluster has them, but still schedules both on a single-node
          # Kind cluster used by the CI failover proof.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: fos1-api-server
      containers:
        - name: api
          image: fos1/api-server:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--address=:8443"
            # Sprint 31 / Ticket 49: load tls.crt/tls.key/ca.crt from a
            # single mount and let pkg/security/certificates handle
            # cert-manager rotation in place.
            - "--cert-dir=/var/run/secrets/fos1.io/tls"
            - "--allowlist-file=/etc/fos1/api/allowlist"
            - "--in-cluster=true"
            - "--v=2"
          env:
            # POD_NAMESPACE is required by the leader-election Lease so
            # it lives in this controller's own namespace (no cluster-
            # scoped binding).
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          volumeMounts:
            - name: tls
              mountPath: /var/run/secrets/fos1.io/tls
              readOnly: true
            - name: allowlist
              mountPath: /etc/fos1/api/allowlist
              subPath: allowlist
              readOnly: true
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
      volumes:
        - name: tls
          secret:
            secretName: fos1-api-server-tls
        - name: allowlist
          configMap:
            name: fos1-api-server-allowlist
