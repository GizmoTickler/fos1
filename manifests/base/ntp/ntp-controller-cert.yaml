---
# Sprint 31 / Ticket 49 — server cert for the ntp-controller's metrics
# exporter and management API listeners.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ntp-controller-tls
  namespace: network
  labels:
    app.kubernetes.io/part-of: fos1
    app.kubernetes.io/component: tls-server
spec:
  secretName: ntp-controller-tls
  duration: 2160h    # 90d
  renewBefore: 360h  # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  commonName: ntp-controller
  dnsNames:
    - ntp-controller.network.svc
    - ntp-controller.network.svc.cluster.local
  usages:
    - server auth
    - digital signature
    - key encipherment
  issuerRef:
    name: fos1-internal-ca
    kind: ClusterIssuer
    group: cert-manager.io
