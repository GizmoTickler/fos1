apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - crds/routes.yaml
  - crds/network_interfaces.yaml
  # firewall_rules.yaml removed per ADR-0001 (sprint 29 ticket 33).
  # FilterPolicy (pkg/security/policy) is the authoritative policy surface;
  # FirewallRule was schema-only with no controller backing.
  - crds/dpi_policies.yaml
  - crds/vlans.yaml
  - crds/cilium_network_policies.yaml
  - cilium.yaml

namespace: kube-system

commonLabels:
  app.kubernetes.io/part-of: fos1
  app.kubernetes.io/component: network
