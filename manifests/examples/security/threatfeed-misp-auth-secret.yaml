# Example Secret shape expected by a MISP-format ThreatFeed's authSecretRef
# (Sprint 31 Ticket 53).
#
# The threat-intel controller reads the `apiKey` data key from this Secret and
# injects it into the MISPFetcher's Authorization header. No other keys are
# consumed in v0.
#
# Generate the Secret at deploy time from your MISP instance's API key — do
# NOT commit a real key to Git. The stringData block below shows the expected
# shape; the production pattern is to seed the Secret via a sealed-secret or
# out-of-band kubectl apply:
#
#   kubectl -n security create secret generic misp-api-key \
#     --from-literal=apiKey="<paste your MISP API token here>"
#
# If Secret rotation is required, update the Secret contents — the controller
# reloads the API key on its next fetcher rebuild (either the first time the
# feed is reconciled after the CR's URL/format/authSecretRef changes, or after
# the controller restarts). A Secret rotation alone without any ThreatFeed
# spec change will not trigger an immediate reload in v0.
apiVersion: v1
kind: Secret
metadata:
  name: misp-api-key
  namespace: security
type: Opaque
stringData:
  apiKey: "REPLACE-ME-WITH-YOUR-MISP-API-TOKEN"
